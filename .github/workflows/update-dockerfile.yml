name: Update Dockerfile
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: update-dockerfile
  cancel-in-progress: false
jobs:
  update-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Resolve Alpine versions
        id: alpine
        shell: bash
        run: |
          set -euo pipefail

          CURRENT=$(grep -oE 'alpine:[0-9.]+' Dockerfile | head -1 | cut -d: -f2)
          LATEST=$(curl -fsSL "https://hub.docker.com/v2/repositories/library/alpine/tags?page_size=100" \
            | jq -r '.results[].name' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)

          if [[ -z "$LATEST" ]]; then
            echo "::error::Failed to resolve latest Alpine version from Docker Hub"
            exit 1
          fi

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

          if [[ "$CURRENT" == "$LATEST" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Dockerfile already pins alpine:$CURRENT (latest)."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Updating Dockerfile from alpine:$CURRENT to alpine:$LATEST."
          fi
      - name: Update Dockerfile
        if: steps.alpine.outputs.changed == 'true'
        run: |
          sed -i -E "s|FROM alpine:[0-9.]+|FROM alpine:${{ steps.alpine.outputs.latest }}|g" Dockerfile
      - name: Create Pull Request
        if: steps.alpine.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "Update Alpine to ${{ steps.alpine.outputs.latest }}"
          title: "Update Alpine to ${{ steps.alpine.outputs.latest }}"
          body: |
            Automated update of Dockerfile Alpine base image.

            - Previous: `alpine:${{ steps.alpine.outputs.current }}`
            - Latest: `alpine:${{ steps.alpine.outputs.latest }}`
          base: develop
          branch: auto/update-dockerfile-alpine-${{ steps.alpine.outputs.latest }}
          assignees: d1ceward
          labels: 'type: dependencies'
